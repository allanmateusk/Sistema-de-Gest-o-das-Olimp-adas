services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sgo
      POSTGRES_USER: sgo
      POSTGRES_PASSWORD: sgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgo -d sgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sgo
      DB_USER: sgo
      DB_PASSWORD: sgo
      JWT_SECRET: ${JWT_SECRET:-changeMeDevSecretKeyAtLeast32CharactersLong!!}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
